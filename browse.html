<head>
  <meta charset="UTF-8">

  <title>Browse Trades — GameBarterHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/notification.css">

  <style>
    .browse-header {
      padding: 40px 24px 20px;
      max-width: 1200px; margin: 0 auto;
    }
    .browse-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem; font-weight: 700; margin-bottom: 6px;
    }
    .browse-subtitle { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 24px; }

    .browse-filter {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .filter-btn {
      padding: 6px 16px; border-radius: 20px;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      font-family: 'Exo 2', sans-serif;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      background: rgba(0,229,255,0.08);
    }
    @media (max-width: 768px) {
      .browse-filter { gap: 6px; }
      .filter-btn    { padding: 5px 12px; font-size: 0.72rem; }
    }
  </style>

      projectId: "gbhub-25a16",

<body>

<!-- Navbar injected by navbar-template.js -->

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Trade Details</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Edit Trade Overlay -->
<div id="editTradeOverlay" class="modal-overlay" onclick="if(event.target===this)closeEditTradeModal()"></div>

<!-- ═══ PAGE CONTENT ═══ -->
<div class="browse-header">
  <div class="browse-title">Browse Trades</div>
  <p class="browse-subtitle">Find the best items and accounts from our community</p>
  <div class="browse-filter" id="browseFilter"></div>
</div>

<div class="section" style="padding-top:0">
  <div class="trades-grid" id="browseGrid">
    <p style="color:var(--text-muted);padding:32px;text-align:center;grid-column:1/-1">Loading...</p>
  </div>
</div>

<!-- ═══ SCRIPTS ═══ -->
<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
<script src="js/notification.js"></script>
<script src="js/navbar-template.js"></script>
<script src="js/chat.js"></script>
<script src="js/trades.js"></script>
<script>
  let currentFilter = 'all';
  // Counts from the full unfiltered load (used for badges on filter buttons)
  let _allGameCounts = {};

  function renderFilters() {
    document.getElementById('browseFilter').innerHTML =
      `<button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">
         All Games <span style="opacity:0.65;font-size:0.72em">(${Object.values(_allGameCounts).reduce((a,b)=>a+b,0)})</span>
       </button>` +
      GAMES.map(g => {
        const cnt = _allGameCounts[g.id] || 0;
        return `<button class="filter-btn ${currentFilter === g.id ? 'active' : ''}" onclick="setFilter('${g.id}')">
          ${g.icon} ${g.name} ${cnt > 0 ? `<span style="opacity:0.65;font-size:0.72em">(${cnt})</span>` : ''}
        </button>`;
      }).join('');
  }

  function renderBrowseGrid() {
    const grid = document.getElementById('browseGrid');
    if (!state.trades.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-state-icon">🔍</div>
        <p>No trades found in this category yet.</p>
      </div>`;
      return;
    }
    grid.innerHTML = state.trades.map(t => tradeCardHTML(t)).join('');
  }

  async function setFilter(id) {
    currentFilter = id;
    // Show loading only in grid, not in filter bar
    document.getElementById('browseGrid').innerHTML =
      '<p style="color:var(--text-muted);padding:32px;text-align:center;grid-column:1/-1">Loading...</p>';
    // Load only matching trades from Firestore (server-side filter)
    await loadTrades(id === 'all' ? null : id);
    renderFilters();
    renderBrowseGrid();
    // Update URL without reload so the filter is bookmarkable/shareable
    const url = new URL(window.location.href);
    if (id === 'all') { url.searchParams.delete('game'); }
    else { url.searchParams.set('game', id); }
    history.replaceState(null, '', url.toString());
  }

  // Build per-game counts from a full unfiltered load
  async function buildGameCounts() {
    const db = firebase.firestore();
    const snap = await db.collection('trades').get();
    _allGameCounts = {};
    snap.docs.forEach(d => {
      const g = d.data().game;
      if (g) _allGameCounts[g] = (_allGameCounts[g] || 0) + 1;
    });
  }

  // Initial page load
  (async () => {
    await restoreSession();
    const params = new URLSearchParams(window.location.search);
    const gameParam = params.get('game');
    const tradeParam = params.get('trade');

    if (gameParam && GAMES.find(g => g.id === gameParam)) {
      currentFilter = gameParam;
    }

    // Build counts in background (non-blocking)
    buildGameCounts().then(() => renderFilters());

    // Load trades for the active filter
    await loadTrades(currentFilter === 'all' ? null : currentFilter);
    renderFilters();
    renderBrowseGrid();

    // If opened via a shared link (?trade=xxx), open that trade modal
    if (tradeParam) {
      setTimeout(() => openTradeModal(tradeParam), 400);
    }
  })();
</script>
</body>
</html>
