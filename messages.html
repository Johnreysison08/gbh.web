<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/notification.css">
  <link rel="stylesheet" href="css/forms.css">

  <!-- Firebase compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>

      apiKey:            "AIzaSyD5-g1bjXfgd1w9boHbfLX8EMnt6tr9yuM",
      authDomain:        "gbhub-25a16.firebaseapp.com",
      projectId:         "gbhub-25a16",
      storageBucket:     "gbhub-25a16.firebasestorage.app",
      messagingSenderId: "1031854442872",
      appId:             "1:1031854442872:web:208bc4663cace89f43608d",
      measurementId:     "G-XV7WMV0Q82",

  <style>
    /* ═══════════════════════════════════════════════
       MESSAGES PAGE STYLES
    ═══════════════════════════════════════════════ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .messages-page {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 64px);
      max-width: 1280px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #chatSidebar {
      display: flex; flex-direction: column;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }

    .sidebar-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.25rem; font-weight: 700;
      letter-spacing: 0.04em; flex: 1;
    }

    #totalUnreadBadge {
      display: none;
      background: #ff3b3b; color: #fff;
      font-size: 0.65rem; font-weight: 700;
      padding: 2px 7px; border-radius: 10px;
      align-items: center; justify-content: center;
      min-width: 20px;
    }

    .sidebar-search {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-search input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.82rem; color: var(--text-primary);
      outline: none; transition: border-color 0.2s;
    }
    .sidebar-search input:focus { border-color: var(--accent-cyan); }
    .sidebar-search input::placeholder { color: var(--text-muted); }

    #chatList { flex: 1; overflow-y: auto; }

    /* ── Contact row ── */
    .chat-contact {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,229,255,0.05);
      transition: background 0.15s; position: relative;
    }
    .chat-contact:hover  { background: rgba(0,229,255,0.05); }
    .chat-contact.active { background: rgba(0,229,255,0.09); }
    .chat-contact.has-unread .contact-name    { font-weight: 700; }
    .chat-contact.has-unread .contact-preview { color: var(--text-secondary); font-weight: 500; }

    .contact-avatar {
      position: relative;
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; font-weight: 700; color: #0a0e1a;
      overflow: visible; flex-shrink: 0;
    }
    .contact-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

    .presence-dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 11px; height: 11px; border-radius: 50%;
      border: 2px solid var(--bg-card);
      background: var(--text-muted); z-index: 2;
    }
    .presence-dot.online  { background: var(--accent-green); }
    .presence-dot.offline { background: var(--text-muted); }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name    { font-size: 0.87rem; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-preview { font-size: 0.74rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .contact-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .contact-time { font-size: 0.68rem; color: var(--text-muted); }
    .unread-badge {
      background: var(--accent-cyan); color: #000;
      font-size: 0.63rem; font-weight: 700;
      padding: 2px 6px; border-radius: 10px;
      min-width: 18px; text-align: center;
    }

    .chat-empty-sidebar {
      padding: 48px 24px; text-align: center;
      color: var(--text-muted); font-size: 0.83rem; line-height: 1.6;
    }

    /* ── Main area ── */
    #chatMain {
      display: flex; flex-direction: column;
      background: var(--bg-dark); overflow: hidden;
    }

    .chat-welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; color: var(--text-muted);
      text-align: center; padding: 40px;
    }
    .welcome-icon { font-size: 3.5rem; }
    .chat-welcome h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; color: var(--text-secondary); }
    .chat-welcome p { font-size: 0.85rem; line-height: 1.6; max-width: 320px; }

    /* ── Chat header ── */
    .chat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      display: none; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      border: none; border-radius: 8px;
      background: transparent; color: var(--text-secondary);
      cursor: pointer; transition: background 0.15s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.06); }

    .header-avatar {
      position: relative; width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; color: #0a0e1a;
      overflow: visible; flex-shrink: 0;
    }
    .header-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .header-avatar .presence-dot { bottom: 0; right: 0; border-color: var(--bg-card); }

    .header-info { flex: 1; }
    .header-name  { font-weight: 600; font-size: 0.92rem; line-height: 1.2; }
    .header-status { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }
    .online-label { color: var(--accent-green); }

    /* ── Messages area ── */
    .messages-area {
      flex: 1; overflow-y: auto;
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 4px;
    }

    .loading-msgs {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; color: var(--text-muted); font-size: 0.82rem; margin: auto;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(0,229,255,0.2);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .date-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 14px 0 8px; color: var(--text-muted); font-size: 0.7rem;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .date-divider span { white-space: nowrap; }

    .msg-row { display: flex; margin-bottom: 2px; }
    .msg-row.mine   { justify-content: flex-end; }
    .msg-row.theirs { justify-content: flex-start; }

    .msg-bubble-wrap { max-width: 72%; display: flex; flex-direction: column; }
    .msg-row.mine .msg-bubble-wrap { align-items: flex-end; }

    .msg-bubble {
      padding: 10px 14px; border-radius: 18px;
      font-size: 0.885rem; line-height: 1.55;
      word-break: break-word; white-space: pre-wrap;
    }
    .msg-row.mine .msg-bubble {
      background: linear-gradient(135deg, rgba(0,229,255,0.22), rgba(0,180,200,0.14));
      border: 1px solid rgba(0,229,255,0.32);
      border-radius: 18px 18px 4px 18px;
      color: var(--text-primary);
    }
    .msg-row.theirs .msg-bubble {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 4px 18px 18px 18px;
      color: var(--text-primary);
    }

    .msg-time { font-size: 0.67rem; color: var(--text-muted); margin-top: 3px; padding: 0 2px; }

    .read-receipt { font-size: 0.65rem; color: var(--text-muted); text-align: right; padding: 0 2px; }
    .read-receipt.seen { color: var(--accent-cyan); }

    .empty-chat {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; margin: auto; text-align: center;
      color: var(--text-muted); padding: 40px 24px;
    }
    .empty-chat-icon { font-size: 2.8rem; }
    .empty-chat p    { font-size: 0.84rem; line-height: 1.6; max-width: 280px; }
    .empty-chat strong { color: var(--text-secondary); }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 24px 4px;
      font-size: 0.75rem; color: var(--text-muted);
    }
    .typing-dots {
      display: flex; align-items: center; gap: 3px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 6px 10px;
    }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.5; }
      30%          { transform: translateY(-4px); opacity: 1; }
    }

    /* ── Input area ── */
    .input-area {
      display: flex; align-items: flex-end; gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0; position: relative;
    }

    .emoji-wrap { position: relative; }
    .emoji-toggle-btn {
      width: 38px; height: 38px;
      border: none; border-radius: 10px;
      background: transparent; color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; flex-shrink: 0;
    }
    .emoji-toggle-btn:hover { background: rgba(0,229,255,0.08); color: var(--accent-cyan); }

    .emoji-picker {
      position: absolute; bottom: 48px; left: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px;
      display: none; flex-wrap: wrap; gap: 5px;
      max-width: 272px; z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    .emoji-picker.open { display: flex; }
    .emoji-picker span {
      font-size: 1.35rem; cursor: pointer;
      padding: 4px 5px; border-radius: 7px;
      transition: background 0.12s;
    }
    .emoji-picker span:hover { background: rgba(0,229,255,0.1); }

    .msg-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.9rem; color: var(--text-primary);
      outline: none; resize: none;
      max-height: 130px; overflow-y: auto;
      line-height: 1.5; transition: border-color 0.2s;
    }
    .msg-input:focus  { border-color: var(--accent-cyan); }
    .msg-input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent-cyan); border: none;
      color: #0a0e1a; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.15s; flex-shrink: 0;
    }
    .send-btn:hover  { background: #00cfee; transform: scale(1.07); }
    .send-btn:active { transform: scale(0.95); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .messages-page { grid-template-columns: 1fr; }
      #chatSidebar { height: calc(100vh - 64px); border-right: none; }
      #chatSidebar.mobile-hidden { display: none; }
      #chatMain {
        display: none; position: fixed; inset: 0; top: 64px;
        z-index: 50; height: calc(100vh - 64px);
      }
      #chatMain.mobile-open { display: flex; }
      .back-btn { display: flex !important; }
    }
  </style>
</head>
<body>

<div class="messages-page">
  <div id="chatSidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">💬 Messages</span>
      <span id="totalUnreadBadge"></span>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="Search conversations…"
        oninput="filterChats(this.value)" id="chatSearchInput" autocomplete="off">
    </div>
    <div id="chatList">
      <div class="chat-empty-sidebar">
        <div style="font-size:2rem;margin-bottom:8px">⏳</div>
        <p>Loading…</p>
      </div>
    </div>
  </div>

  <div id="chatMain">
    <div class="chat-welcome">
      <div class="welcome-icon">💬</div>
      <h3>Your Messages</h3>
      <p>Select a conversation to start chatting, or visit a trade post and click <strong>"Message"</strong> to connect with a trader.</p>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
<script src="js/notification.js"></script>
<script src="js/navbar-template.js"></script>
<script src="js/chat.js"></script>

<script>
async function initMessagesPage() {
  await restoreSession();
  if (!state.currentUser) { window.location.href = 'login.html'; return; }

  initPresence(state.currentUser.uid);
  startChatsListener();

  const pending = sessionStorage.getItem('gbh_openChat');
  if (pending) {
    sessionStorage.removeItem('gbh_openChat');
    try {
      const { chatId, partnerUid } = JSON.parse(pending);
      setTimeout(() => openChat(chatId, partnerUid), 700);
    } catch (_) {}
  }
}
document.addEventListener('DOMContentLoaded', initMessagesPage);
</script>
</body>
</html>
